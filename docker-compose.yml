# ============================================================
# docker-compose.yml — Full Biometric Voting Stack
# ============================================================
version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: voting_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       biometric_voting
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d biometric_voting"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: voting_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend API ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voting_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:                  production
      PORT:                      5000
      DB_HOST:                   postgres
      DB_PORT:                   5432
      DB_NAME:                   biometric_voting
      DB_USER:                   postgres
      DB_PASSWORD:               ${DB_PASSWORD:-changeme}
      REDIS_URL:                 redis://redis:6379
      JWT_SECRET:                ${JWT_SECRET:-change_this_in_production}
      ADMIN_JWT_SECRET:          ${ADMIN_JWT_SECRET:-change_admin_secret}
      BIOMETRIC_ENCRYPTION_KEY:  ${BIOMETRIC_ENCRYPTION_KEY:-}
      RP_ID:                     ${RP_ID:-localhost}
      ORIGIN:                    ${ORIGIN:-http://localhost:3000}
      FRONTEND_URL:              ${FRONTEND_URL:-http://localhost:3000}
      FACE_MATCH_THRESHOLD:      ${FACE_MATCH_THRESHOLD:-0.45}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voting_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000/api}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
